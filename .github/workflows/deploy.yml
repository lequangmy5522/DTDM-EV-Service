name: Deploy EV Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #########################
      # Build & Push Frontend #
      #########################

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: lequangm/frontend:latest

      ##########################
      # Build API Gateway      #
      ##########################

      - name: Build API Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          push: true
          tags: lequangm/api-gateway:latest

      ##########################
      # User Service           #
      ##########################

      - name: Build User Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-service
          push: true
          tags: lequangm/user-service:latest

      - name: Build Inventory Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/inventory-service
          push: true
          tags: lequangm/inventory-service:latest

      - name: Build Booking Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/booking-service
          push: true
          tags: lequangm/booking-service:latest

      - name: Build Finance Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/finance-service/Dockerfile
          push: true
          tags: lequangm/finance-service:latest

      - name: Build Maintenance Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/maintenance-service
          push: true
          tags: lequangm/maintenance-service:latest

      - name: Build Payment Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/payment-service
          push: true
          tags: lequangm/payment-service:latest

      - name: Build Notification Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/notification-service
          push: true
          tags: lequangm/notification-service:latest

      - name: Build Report Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/report-service
          push: true
          tags: lequangm/report-service:latest

      - name: Build Chat Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/chat-service
          push: true
          tags: lequangm/chat-service:latest

      - name: Build Staff Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/staff-service
          push: true
          tags: lequangm/staff-service:latest

      ###################################
      # SSH vào Azure VM và Deploy
      ###################################

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/DTDM-EV-Service/DTDM/EV-Service-Center-Full
            docker compose pull
            docker compose down
            docker compose up -d