name: Deploy EV Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #########################
      # Build & Push Frontend #
      #########################

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/frontend
          file: ./DTDM/EV-Service-Center-Full/frontend/dockerfile
          push: true
          tags: lequangm/frontend:latest

      ##########################
      # Build API Gateway      #
      ##########################

      - name: Build API Gateway
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/api-gateway
          file: ./DTDM/EV-Service-Center-Full/api-gateway/Dockerfile
          push: true
          tags: lequangm/api-gateway:latest

      ##########################
      # Services               #
      ##########################

      - name: Build User Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/user-service
          file: ./DTDM/EV-Service-Center-Full/services/user-service/Dockerfile
          push: true
          tags: lequangm/user-service:latest

      - name: Build Inventory Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/inventory-service
          file: ./DTDM/EV-Service-Center-Full/services/inventory-service/Dockerfile
          push: true
          tags: lequangm/inventory-service:latest

      - name: Build Booking Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/booking-service
          file: ./DTDM/EV-Service-Center-Full/services/booking-service/Dockerfile
          push: true
          tags: lequangm/booking-service:latest

      - name: Build Finance Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/finance-service
          file: ./DTDM/EV-Service-Center-Full/services/finance-service/Dockerfile
          push: true
          tags: lequangm/finance-service:latest

      - name: Build Maintenance Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/maintenance-service
          file: ./DTDM/EV-Service-Center-Full/services/maintenance-service/Dockerfile
          push: true
          tags: lequangm/maintenance-service:latest

      - name: Build Payment Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/payment-service
          file: ./DTDM/EV-Service-Center-Full/services/payment-service/Dockerfile
          push: true
          tags: lequangm/payment-service:latest

      - name: Build Notification Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/notification-service
          file: ./DTDM/EV-Service-Center-Full/services/notification-service/Dockerfile
          push: true
          tags: lequangm/notification-service:latest

      - name: Build Report Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/report-service
          file: ./DTDM/EV-Service-Center-Full/services/report-service/Dockerfile
          push: true
          tags: lequangm/report-service:latest

      - name: Build Chat Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/chat-service
          file: ./DTDM/EV-Service-Center-Full/services/chat-service/Dockerfile
          push: true
          tags: lequangm/chat-service:latest

      - name: Build Staff Service
        uses: docker/build-push-action@v6
        with:
          context: ./DTDM/EV-Service-Center-Full/services/staff-service
          file: ./DTDM/EV-Service-Center-Full/services/staff-service/Dockerfile
          push: true
          tags: lequangm/staff-service:latest

      ###################################
      # SSH vào Azure VM và Deploy
      ###################################

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/DTDM-EV-Service/DTDM/EV-Service-Center-Full
            docker compose pull
            docker compose down
            docker compose up -d